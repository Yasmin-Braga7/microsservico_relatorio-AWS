services:
  biblioteca-relatorio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: biblioteca-relatorio
    restart: unless-stopped

    ports:
      - "9504:9504"

    env_file:
      - .env

    environment:
      PORT: 9504
      NODE_ENV: production

      # ── Banco de dados — vem do .env local (não commitado) ──────────────────
      DATABASE_URL: ${DATABASE_URL}

      # ── RabbitMQ ───────────────────────────────────────────────────────────
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_RECONNECT_DELAY: 5000

      # ── Multa por dia de atraso ────────────────────────────────────────────
      VALOR_MULTA_DIA: ${VALOR_MULTA_DIA:-2.50}

      # ── Infisical (gestão de segredos) ─────────────────────────────────────
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      INFISICAL_SITE_URL: ${INFISICAL_SITE_URL:-https://app.infisical.com}

    networks:
      - biblioteca-net

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://biblioteca-relatorio:9504/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Rede interna do projeto Biblioteca ───────────────────────────────────────
networks:
  biblioteca-net:
    external: true
