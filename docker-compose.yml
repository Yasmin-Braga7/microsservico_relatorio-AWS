version: "3.9"

services:
  relatorio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca-relatorio
    restart: unless-stopped

    ports:
      - "9504:9504"        # Porta pública do microsserviço (mapeada no servidor)

    environment:
      PORT: 9504
      NODE_ENV: production

      # ── Banco de dados ─────────────────────────────────────────────────────
      # Configure no arquivo .env (nunca commitar credenciais)
      DATABASE_URL: mysql://20261_projint5_manha:senac@12938@edumysql.acesso.rj.senac.br:3306/20261_projint5_manha_biblioteca_relatorio

      # ── RabbitMQ (servidor externo da faculdade) ───────────────────────────
      RABBITMQ_URL: amqp://admin:admin@10.136.38.50:5672        # amqp://admin:adminadmin@academico3.rj.senac.br:5672
      RABBITMQ_RECONNECT_DELAY: 5000         # ms entre tentativas de reconexão

      # ── Multa por dia de atraso ────────────────────────────────────────────
      VALOR_MULTA_DIA: ${VALOR_MULTA_DIA:-2.50}

    # Garante que o container só sobe se o DB estiver acessível
    # (útil quando o DB também estiver no compose; remova se for externo)
    # depends_on:
    #   db:
    #     condition: service_healthy

    networks:
      - biblioteca-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Rede interna do projeto Biblioteca ───────────────────────────────────────
networks:
  biblioteca-net:
    name: biblioteca-net
    driver: bridge